<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AesthetIQ 3D Viewer</title>
<style>
body{
  margin:0;
  background:#0e0e0e;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  text-align:center;
}
h2{ margin-top:20px; }
#viewer{ width:100%; height:75vh; display:block; }
.controls{ background:#1b1b1b; padding:20px; }
.slider-block{ margin:15px; }
label{ display:block; margin-bottom:5px; font-size:14px; }
input[type=range]{ width:300px; }
</style>
</head>
<body>

<h2>AesthetIQ 3D Botox Simulation</h2>

<canvas id="viewer"></canvas>

<div class="controls">
  <div class="slider-block">
    <label>Botox Intensity</label>
    <input id="intensitySlider" type="range" min="0" max="2" step="0.01" value="1">
  </div>
  <div class="slider-block">
    <label>Recovery Progress</label>
    <input id="recoverySlider" type="range" min="0" max="100" step="1" value="100">
  </div>
</div>

<script type="module" src="faceviewer.js"></script>

</body>
</html>
