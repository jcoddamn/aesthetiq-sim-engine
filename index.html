<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AesthetIQ 2D Simulation</title>

<style>
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  margin:0;
  padding:0;
}

h1{
  margin-top:40px;
  font-size:36px;
}

.controls{
  margin-top:20px;
}

button{
  margin:6px;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
  font-size:14px;
  cursor:pointer;
}

button:hover{
  background:#374151;
}

.preview-container{
  margin-top:30px;
  display:flex;
  justify-content:center;
}

#previewCanvas{
  width:640px;
  height:480px;
  background:black;
  border-radius:10px;
}

#videoElement{
  display:none;
}
</style>

</head>

<body>

<h1>AesthetIQ 2D Simulation</h1>

<div class="controls">

<div>
<strong>Selected Procedure:</strong>
<span id="selectedProcedure">underEyeFiller</span>
</div>

<div style="margin-top:10px">

<button data-procedure="underEyeFiller">Under-Eye Fillers</button>
<button data-procedure="laserResurfacing">Laser Resurfacing</button>
<button data-procedure="lipFillers">Lip Fillers</button>
<button data-procedure="lipFlip">Lip Flip</button>
<button data-procedure="foreheadBotox">Forehead Botox</button>
<button data-procedure="11Lines">11 Lines</button>
<button data-procedure="crowsFeet">Crow's Feet</button>
<button data-procedure="chemicalPeel">Chemical Peel</button>

</div>

<div style="margin-top:20px">
<button id="simulateButton">Generate Preview</button>
</div>

</div>

<div class="preview-container">

<video
id="camera"
autoplay
playsinline
muted  
width="640"
height="480">
style="display:none;">  
</video>

<canvas
id="cameraPreview"
width="640"
height="480">
</canvas>

</div>

<p style="margin-top:10px;color:#9ca3af">
Align your face in the frame, then tap Generate Preview.
</p>


<!-- MEDIAPIPE GLOBAL LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>


<!-- MAIN APP -->
<script type="module" src="./js/appController.js"></script>


<script>

let currentProcedure="underEyeFiller"

const procedureButtons=document.querySelectorAll("button[data-procedure]")
const procedureLabel=document.getElementById("selectedProcedure")

procedureButtons.forEach(btn=>{
  btn.addEventListener("click",()=>{
    currentProcedure=btn.dataset.procedure
    procedureLabel.textContent=currentProcedure
  })
})

</script>

</body>
</html>
